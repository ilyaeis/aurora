services:
  db:
    image: postgres:16-alpine
    container_name: aurora_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aurora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurora_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AURORA_DATABASE_URL: postgresql+asyncpg://aurora:aurora@db:5432/aurora
      AURORA_REDIS_URL: redis://redis:6379/0
      AURORA_OLLAMA_BASE_URL: http://host.docker.internal:11434
      AURORA_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

volumes:
  postgres_data:
  redis_data:
